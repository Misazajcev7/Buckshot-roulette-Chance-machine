<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Buckshot Roulette probability counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Permanent+Marker&family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#15120d;
    --bg-panel:#1f1a13;
    --bg-raised:#2a2118;
    --red:#d4211f;
    --red-deep:#7a1210;
    --red-glow:rgba(212,33,31,.45);
    --green:#5c8a2e;
    --green-deep:#33501a;
    --green-glow:rgba(92,138,46,.45);
    --orange:#e2891f;
    --orange-light:#f0a83f;
    --chalk:#ece6d6;
    --chalk-dim:#a89f8d;
    --ink:#0b0906;
    --border:rgba(236,230,214,.08);
    --font-display:'Caveat','Permanent Marker','Segoe Print',cursive;
    --font-title:'Oswald','Arial Narrow',sans-serif;
    --font-mono:'JetBrains Mono','Consolas',monospace;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 18% -10%, rgba(212,33,31,.10), transparent 55%),
      radial-gradient(ellipse at 90% 105%, rgba(92,138,46,.10), transparent 55%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0px, rgba(255,255,255,.015) 1px, transparent 1px, transparent 3px),
      var(--bg-base);
    color:var(--chalk);
    font-family:var(--font-mono);
    padding:40px 20px 60px;
  }

  .app{max-width:1080px;margin:0 auto;}

  /* ---------- Header ---------- */
  .app-header{margin-bottom:24px;border-bottom:1px dashed rgba(236,230,214,.2);padding-bottom:18px;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;}
  .title{font-family:var(--font-title);font-weight:700;text-transform:uppercase;letter-spacing:.03em;font-size:clamp(24px,4.4vw,40px);margin:0;color:var(--chalk);}
  .slogan{font-family:var(--font-display);font-weight:700;color:var(--orange-light);font-size:clamp(14px,2.2vw,18px);margin:8px 0 0;text-shadow:0 0 18px rgba(240,168,63,.35);}
  .dealer-photo{width:92px;height:92px;border-radius:12px;border:3px solid var(--ink);box-shadow:0 0 22px rgba(212,33,31,.3);object-fit:cover;background:var(--bg-raised);flex-shrink:0;}

  .header-actions{display:flex;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .lang-toggle{display:flex;border:2px solid var(--ink);border-radius:8px;overflow:hidden;}
  .lang-btn{padding:8px 14px;background:var(--bg-raised);color:var(--chalk-dim);border:none;font-family:var(--font-title);font-weight:600;font-size:12px;letter-spacing:.05em;cursor:pointer;}
  .lang-btn.active{background:var(--orange);color:var(--ink);}
  .lang-btn:focus-visible{outline:2px solid var(--orange-light);outline-offset:-2px;}
  .info-btn{padding:8px 16px;border-radius:8px;border:2px solid var(--ink);background:var(--bg-raised);color:var(--chalk);font-family:var(--font-title);font-weight:600;font-size:12px;letter-spacing:.05em;cursor:pointer;}
  .info-btn:hover{background:var(--orange-light);color:var(--ink);}
  .info-btn:focus-visible{outline:2px solid var(--orange-light);outline-offset:2px;}

  @media (max-width:560px){
    .dealer-photo{width:60px;height:60px;}
  }

  /* ---------- Modal ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px;}
  .modal-overlay[hidden]{display:none;}
  .modal-box{background:var(--bg-panel);border:2px solid var(--ink);border-radius:12px;padding:26px;max-width:480px;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 0 44px rgba(0,0,0,.6);}
  .modal-box h2{font-family:var(--font-title);text-transform:uppercase;letter-spacing:.04em;font-size:20px;margin:0 0 14px;color:var(--orange-light);}
  .modal-box p{font-size:12px;line-height:1.7;color:var(--chalk);margin:0 0 8px;}
  .modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:6px;border:2px solid var(--ink);background:var(--red);color:var(--chalk);cursor:pointer;font-size:14px;line-height:1;}

  /* ---------- Calculator ---------- */
  .app-grid{display:grid;grid-template-columns:1fr 260px;gap:28px;align-items:start;}
  @media (max-width:720px){.app-grid{grid-template-columns:1fr;}}

  .calculator{display:flex;flex-direction:column;gap:22px;}

  .row-tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--chalk-dim);margin:0 0 6px 4px;}

  .counter-row{display:flex;gap:16px;align-items:center;background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:14px;}

  .counter-box{display:flex;align-items:center;gap:10px;background:var(--bg-raised);border-radius:8px;padding:8px 10px;flex-shrink:0;}

  .ctrl{width:34px;height:34px;border-radius:6px;border:2px solid var(--ink);background:var(--chalk);color:var(--ink);font-family:var(--font-title);font-size:20px;font-weight:700;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .08s ease,background .15s ease;padding:0;}
  .ctrl:hover:not(:disabled){background:var(--orange-light);}
  .ctrl:active:not(:disabled){transform:scale(.9);}
  .ctrl:disabled{opacity:.3;cursor:not-allowed;}
  .ctrl:focus-visible{outline:3px solid var(--orange-light);outline-offset:2px;}

  .count-display{font-family:var(--font-display);font-weight:700;font-size:30px;min-width:34px;text-align:center;}
  .counter-row[data-color="red"] .count-display{color:var(--red);}
  .counter-row[data-color="green"] .count-display{color:var(--green);}

  .shell-strip{display:flex;flex-wrap:wrap;gap:6px;min-height:64px;align-items:flex-end;flex:1;}

  .shell{width:22px;height:60px;border:3px solid var(--ink);border-radius:6px 6px 0 0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:opacity .3s ease;}
  .shell.fired{opacity:.5;}
  .shell-top{flex:1;}
  .shell-bottom{height:12px;background:var(--orange);border-top:3px solid var(--ink);}
  .shell-red .shell-top{background:var(--red);}
  .shell-green .shell-top{background:var(--green);}

  @keyframes shellPop{from{transform:scaleY(.2);opacity:0;}to{transform:scaleY(1);opacity:1;}}
  .shell-pop{animation:shellPop .18s ease-out;transform-origin:bottom;}

  .chance-readout{display:flex;flex-direction:column;gap:8px;}
  .chance-row{display:flex;align-items:center;justify-content:space-between;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
  .chance-label{font-family:var(--font-display);font-weight:700;font-size:17px;padding:10px 16px;flex:1;}
  .chance-value{font-family:var(--font-title);font-weight:600;font-size:17px;padding:10px 18px;background:var(--bg-raised);min-width:86px;text-align:center;}
  .chance-row[data-color="green"] .chance-label{background:var(--green-deep);color:var(--chalk);}
  .chance-row[data-color="red"] .chance-label{background:var(--red-deep);color:var(--chalk);}

  .mini-caption{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--chalk-dim);margin:4px 0 -2px 2px;}
  .progress-bar{height:16px;border-radius:8px;overflow:hidden;display:flex;border:1px solid rgba(236,230,214,.12);background:var(--bg-raised);}
  .progress-fill{height:100%;transition:width .25s ease;}
  .progress-red{background:var(--red);}
  .progress-green{background:var(--green);}

  /* ---------- Sidebar ---------- */
  .sidebar{display:flex;flex-direction:column;gap:16px;}
  .action-buttons{display:flex;flex-direction:column;gap:10px;}
  .btn-lock,.btn-reset{font-family:var(--font-display);font-weight:700;font-size:19px;padding:14px;border-radius:8px;border:2px solid var(--ink);cursor:pointer;transition:transform .08s ease,filter .15s ease;}
  .btn-lock{background:var(--orange);color:var(--ink);}
  .btn-lock.active{background:var(--orange-light);box-shadow:0 0 0 3px rgba(240,168,63,.35);}
  .btn-reset{background:var(--red);color:var(--chalk);}
  .btn-lock:hover,.btn-reset:hover{filter:brightness(1.08);}
  .btn-lock:active,.btn-reset:active{transform:scale(.96);}
  .btn-lock:focus-visible,.btn-reset:focus-visible{outline:3px solid var(--chalk);outline-offset:2px;}

  .verdict-panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
  .verdict-label{font-family:var(--font-display);font-weight:700;font-size:16px;margin:0 0 12px;color:var(--chalk-dim);}
  .verdict-box{min-height:96px;border-radius:8px;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;transition:background .3s ease,box-shadow .3s ease;background:var(--bg-raised);}
  .verdict-text{font-family:var(--font-title);font-weight:700;font-size:20px;letter-spacing:.08em;color:var(--chalk-dim);}
  .verdict-box.verdict-red{background:var(--red);box-shadow:0 0 26px var(--red-glow);animation:flicker 2.4s infinite;}
  .verdict-box.verdict-green{background:var(--green);box-shadow:0 0 26px var(--green-glow);animation:flicker 2.6s infinite;}
  .verdict-box.verdict-tie{background:linear-gradient(90deg,var(--red) 50%,var(--green) 50%);}
  .verdict-box.verdict-red .verdict-text,.verdict-box.verdict-green .verdict-text,.verdict-box.verdict-tie .verdict-text{color:var(--chalk);text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .verdict-delta{font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin:10px 0 0;line-height:1.5;}
  .verdict-delta.hidden{display:none;}

  @keyframes flicker{
    0%,100%{filter:brightness(1);}
    92%{filter:brightness(1);}
    93%{filter:brightness(.85);}
    94%{filter:brightness(1.05);}
    95%{filter:brightness(.9);}
    96%{filter:brightness(1);}
  }

  .voice-panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
  .identity-row{display:flex;gap:8px;margin-bottom:12px;}
  #custom-name{flex:1;min-width:0;background:var(--bg-raised);border:2px solid var(--ink);border-radius:6px;padding:8px 10px;color:var(--chalk);font-family:var(--font-mono);font-size:12px;}
  #custom-name::placeholder{color:var(--chalk-dim);}
  #voice-gender{background:var(--bg-raised);border:2px solid var(--ink);border-radius:6px;padding:8px;color:var(--chalk);font-family:var(--font-mono);font-size:12px;}
  #custom-name:focus-visible,#voice-gender:focus-visible{outline:2px solid var(--orange-light);}

  .btn-voice{width:100%;font-family:var(--font-title);font-weight:600;font-size:13px;padding:12px;border-radius:8px;border:2px solid var(--ink);background:var(--bg-raised);color:var(--chalk);cursor:pointer;transition:background .15s ease,box-shadow .15s ease;}
  .btn-voice:hover{background:var(--orange-light);color:var(--ink);}
  .btn-voice.listening{background:var(--green);color:var(--chalk);box-shadow:0 0 18px var(--green-glow);animation:flicker 2.6s infinite;}
  .btn-voice:disabled{opacity:.4;cursor:not-allowed;}
  .voice-status{font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);margin:10px 0 0;letter-spacing:.05em;min-height:14px;}

  @media (max-width:720px){
    .identity-row{flex-direction:column;}
  }

  @media (prefers-reduced-motion:reduce){
    .shell-pop{animation:none;}
    .verdict-box.verdict-red,.verdict-box.verdict-green,.btn-voice.listening{animation:none;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="header-top">
      <div class="header-titles">
        <h1 class="title" data-i18n="title">Buckshot Roulette probability counter</h1>
        <p class="slogan" data-i18n="slogan">Live or blank? Learn your fate...</p>
      </div>
      <!-- Placeholder — swap src for the real dealer photo URL -->
      <img class="dealer-photo" id="dealer-photo" alt="Dealer" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23241d15'/%3E%3Ccircle cx='50' cy='40' r='19' fill='%232a2118' stroke='%23e2891f' stroke-width='2'/%3E%3Cpath d='M18 92 Q50 58 82 92' fill='%232a2118' stroke='%23e2891f' stroke-width='2'/%3E%3C/svg%3E" />
    </div>

    <div class="header-actions">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="lang-btn active" id="lang-en" type="button">EN</button>
        <button class="lang-btn" id="lang-ru" type="button">RU</button>
      </div>
      <button class="info-btn" id="info-btn" type="button" data-i18n="infoBtn">Info</button>
    </div>
  </header>

  <div class="app-grid">
    <div class="calculator">

      <div>
        <p class="row-tag" data-i18n="liveRoundsTag">Live rounds</p>
        <div class="counter-row" data-color="red">
          <div class="counter-box">
            <button class="ctrl" id="red-plus" data-i18n-aria="addLabel" aria-label="Add live round">+</button>
            <div class="count-display" id="red-count">0</div>
            <button class="ctrl" id="red-minus" data-i18n-aria="removeLabel" aria-label="Remove live round">&minus;</button>
          </div>
          <div class="shell-strip" id="red-strip"></div>
        </div>
      </div>

      <div>
        <p class="row-tag" data-i18n="blankRoundsTag">Blank rounds</p>
        <div class="counter-row" data-color="green">
          <div class="counter-box">
            <button class="ctrl" id="green-plus" data-i18n-aria="addBlankLabel" aria-label="Add blank round">+</button>
            <div class="count-display" id="green-count">0</div>
            <button class="ctrl" id="green-minus" data-i18n-aria="removeBlankLabel" aria-label="Remove blank round">&minus;</button>
          </div>
          <div class="shell-strip" id="green-strip"></div>
        </div>
      </div>

      <div class="chance-readout" aria-live="polite">
        <div class="chance-row" data-color="green">
          <span class="chance-label" data-i18n="greenChanceLabel">Green chance</span>
          <span class="chance-value" id="green-chance">0.0%</span>
        </div>
        <div class="chance-row" data-color="red">
          <span class="chance-label" data-i18n="redChanceLabel">Red chance</span>
          <span class="chance-value" id="red-chance">0.0%</span>
        </div>
      </div>

      <div>
        <p class="mini-caption" data-i18n="progressCaption">Load ratio</p>
        <div class="progress-bar">
          <div class="progress-fill progress-red" id="progress-red" style="width:0%"></div>
          <div class="progress-fill progress-green" id="progress-green" style="width:0%"></div>
        </div>
      </div>

    </div>

    <aside class="sidebar">
      <div class="action-buttons">
        <button class="btn-lock" id="lock-btn">Lock</button>
        <button class="btn-reset" id="reset-btn" data-i18n="resetBtn">Reset</button>
      </div>

      <div class="verdict-panel">
        <p class="verdict-label" id="verdict-label">Sam predicts:</p>
        <div class="verdict-box" id="verdict-box" aria-live="polite">
          <span class="verdict-text" id="verdict-text">&mdash;</span>
        </div>
        <p class="verdict-delta hidden" id="verdict-delta"></p>
      </div>

      <div class="voice-panel">
        <p class="mini-caption" data-i18n="identityPanelTitle">Assistant identity</p>
        <div class="identity-row">
          <input type="text" id="custom-name" maxlength="20" data-i18n-placeholder="namePlaceholder" placeholder="Sam" />
          <select id="voice-gender">
            <option value="male" data-i18n="genderMale">Male</option>
            <option value="female" data-i18n="genderFemale">Female</option>
          </select>
        </div>

        <p class="verdict-label" data-i18n="voicePanelTitle">Voice control</p>
        <button class="btn-voice" id="voice-btn">Enable voice</button>
        <p class="voice-status" id="voice-status">Microphone off</p>
      </div>
    </aside>
  </div>
</div>

<div class="modal-overlay" id="info-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
  <div class="modal-box">
    <button class="modal-close" id="modal-close" type="button" aria-label="Close">&#10005;</button>
    <h2 id="modal-title" data-i18n="modalTitle">How to use</h2>
    <div data-i18n-html="modalBody"></div>
  </div>
</div>

<script>
(function(){
  var state = { red: 0, green: 0, locked: false, customName: '', voiceGender: 'male' };
  var currentLang = 'en';

  var el = {
    redCount: document.getElementById('red-count'),
    greenCount: document.getElementById('green-count'),
    redStrip: document.getElementById('red-strip'),
    greenStrip: document.getElementById('green-strip'),
    greenChance: document.getElementById('green-chance'),
    redChance: document.getElementById('red-chance'),
    progressRed: document.getElementById('progress-red'),
    progressGreen: document.getElementById('progress-green'),
    verdictBox: document.getElementById('verdict-box'),
    verdictText: document.getElementById('verdict-text'),
    verdictDelta: document.getElementById('verdict-delta'),
    verdictLabel: document.getElementById('verdict-label'),
    lockBtn: document.getElementById('lock-btn'),
    resetBtn: document.getElementById('reset-btn'),
    redPlus: document.getElementById('red-plus'),
    redMinus: document.getElementById('red-minus'),
    greenPlus: document.getElementById('green-plus'),
    greenMinus: document.getElementById('green-minus'),
    voiceBtn: document.getElementById('voice-btn'),
    voiceStatus: document.getElementById('voice-status'),
    langEn: document.getElementById('lang-en'),
    langRu: document.getElementById('lang-ru'),
    infoBtn: document.getElementById('info-btn'),

    modalClose: document.getElementById('modal-close'),
    customNameInput: document.getElementById('custom-name'),
    voiceGenderSelect: document.getElementById('voice-gender')
  };

  // ---------- i18n ----------
  var translations = {
    en: {
      title: 'Buckshot Roulette probability counter',
      slogan: "Live or blank? Learn your fate...",
      infoBtn: 'Info',
      resetBtn: 'Reset',
      lock: 'Lock',
      unlock: 'Unlock',
      liveRoundsTag: 'Live rounds',
      blankRoundsTag: 'Blank rounds',
      greenChanceLabel: 'Green chance',
      redChanceLabel: 'Red chance',
      progressCaption: 'Load ratio',
      verdictLive: 'LIVE',
      verdictBlank: 'BLANK',
      verdictTie: '50 / 50',
      streakLive: 'Live streak',
      streakBlank: 'Blank streak',
      voicePanelTitle: 'Voice control',

      voiceStatusUnsupported: 'Voice commands not supported by this browser',
      modalTitle: 'How to use',
      modalBody: '<p><b>Add:</b> "plus" / "add" + color (+ number 1-8)</p><p><b>Remove:</b> "minus" / "remove" + color (+ number)</p><p><b>Colors:</b> "live" / "red", "blank" / "green"</p><p><b>Reset:</b> say "reset" or "clear"</p><p><b>Prediction:</b> say the assistant&rsquo;s name, or "what&rsquo;s next"</p><p><b>Keyboard:</b> 7 / 9 &mdash; live +/&minus;, 1 / 3 &mdash; blank +/&minus;</p>',
      addLabel: 'Add live round',
      removeLabel: 'Remove live round',
      addBlankLabel: 'Add blank round',
      removeBlankLabel: 'Remove blank round',
      verdictLabelText: function(name){ return name + ' predicts:'; },
      speechEmpty: function(name){ return name + ' says the chamber is empty.'; },
      speechPredict: function(name, word){ return name + ' thinks the next one is ' + word + '.'; },
      speechLive: 'live',

      defaultName: 'Sam'
    },
    ru: {

      unlock: 'Разблокировать',

      streakBlank: 'Серия холостых',
      voicePanelTitle: 'Голосовое управление',
      identityPanelTitle: 'Имя помощника',
      namePlaceholder: 'Сэм',
      genderMale: 'Мужской',
      genderFemale: 'Женский',
      voiceBtnIdle: 'Включить голос',
      voiceBtnListening: 'Слушаю…',
      voiceStatusIdle: 'Микрофон выключен',
      voiceStatusListening: 'Скажи цвет + добавить/убрать, или имя помощника…',
      voiceStatusDenied: 'Доступ к микрофону запрещён',
      voiceStatusUnsupported: 'Голосовые команды не поддерживаются браузером',
      modalTitle: 'Как пользоваться',
      modalBody: '<p><b>Добавить:</b> «плюс»/«добавить» + цвет (+ число 1-8)</p><p><b>Убрать:</b> «минус»/«убрать» + цвет (+ число)</p><p><b>Цвета:</b> «боевой»/«красный», «холостой»/«зелёный»</p><p><b>Сброс:</b> скажи «сброс» или «очистить»</p><p><b>Прогноз:</b> скажи имя помощника или «какой следующий»</p><p><b>Клавиши:</b> 7 / 9 &mdash; боевые +/&minus;, 1 / 3 &mdash; холостые +/&minus;</p>',
      addLabel: 'Добавить боевой',
      removeLabel: 'Убрать боевой',
      addBlankLabel: 'Добавить холостой',
      removeBlankLabel: 'Убрать холостой',
      verdictLabelText: function(name){ return name + ' думает, дальше:'; },
      speechEmpty: function(name){ return name + ' говорит: патроны ещё не загружены.'; },
      speechPredict: function(name, word){ return name + ' думает, следующий будет ' + word + '.'; },
      speechLive: 'боевой',
      speechBlank: 'холостой',
      speechTie: 'пятьдесят на пятьдесят',
      defaultName: 'Сэм'
    }
  };

  function defaultAssistantName(){
    return state.customName || translations[currentLang].defaultName;
  }

  function applyTranslations(){
    var dict = translations[currentLang];

    var nodes = document.querySelectorAll('[data-i18n]');
    for (var i = 0; i < nodes.length; i++) {
      var key = nodes[i].getAttribute('data-i18n');
      if (typeof dict[key] === 'string') nodes[i].textContent = dict[key];
    }
    var ph = document.querySelectorAll('[data-i18n-placeholder]');
    for (var j = 0; j < ph.length; j++) {
      var pk = ph[j].getAttribute('data-i18n-placeholder');
      if (typeof dict[pk] === 'string') ph[j].placeholder = dict[pk];
    }
    var html = document.querySelectorAll('[data-i18n-html]');
    for (var k = 0; k < html.length; k++) {
      var hk = html[k].getAttribute('data-i18n-html');
      if (typeof dict[hk] === 'string') html[k].innerHTML = dict[hk];
    }
    var aria = document.querySelectorAll('[data-i18n-aria]');
    for (var m = 0; m < aria.length; m++) {
      var ak = aria[m].getAttribute('data-i18n-aria');
      if (typeof dict[ak] === 'string') aria[m].setAttribute('aria-label', dict[ak]);
    }

    document.title = dict.title;
    refreshLockButton();
    refreshVerdictLabel();
    refreshVoiceUI();
    renderChances();
  }

  function refreshVerdictLabel(){
    el.verdictLabel.textContent = translations[currentLang].verdictLabelText(defaultAssistantName());
  }

  function refreshLockButton(){
    var dict = translations[currentLang];
    el.lockBtn.textContent = state.locked ? dict.unlock : dict.lock;
  }

  function refreshVoiceUI(){
    var dict = translations[currentLang];
    if (!SpeechRecognitionCtor) {
      el.voiceStatus.textContent = dict.voiceStatusUnsupported;
      return;
    }
    if (recognitionActive) {
      el.voiceBtn.textContent = dict.voiceBtnListening;
      el.voiceStatus.textContent = dict.voiceStatusListening;
    } else {
      el.voiceBtn.textContent = dict.voiceBtnIdle;
      el.voiceStatus.textContent = dict.voiceStatusIdle;
    }
  }

  function setLanguage(lang){
    currentLang = lang;
    el.langEn.classList.toggle('active', lang === 'en');
    el.langRu.classList.toggle('active', lang === 'ru');
    document.documentElement.lang = lang;
    applyTranslations();

    var recLang = lang === 'ru' ? 'ru-RU' : 'en-US';
    if (recognition) {
      recognition.lang = recLang;
      if (recognitionActive) {
        try { recognition.stop(); } catch(e){}
      }
    }
  }

  el.langEn.addEventListener('click', function(){ setLanguage('en'); });
  el.langRu.addEventListener('click', function(){ setLanguage('ru'); });

  el.infoBtn.addEventListener('click', function(){ el.infoModal.hidden = false; });
  el.modalClose.addEventListener('click', function(){ el.infoModal.hidden = true; });
  el.infoModal.addEventListener('click', function(e){
    if (e.target === el.infoModal) el.infoModal.hidden = true;
  });

  el.customNameInput.addEventListener('input', function(){
    state.customName = el.customNameInput.value.trim();
    refreshVerdictLabel();
  });
  el.voiceGenderSelect.addEventListener('change', function(){
    state.voiceGender = el.voiceGenderSelect.value;
  });

  // ---------- Shells / math ----------
  function createShell(color){
    var shell = document.createElement('div');
    shell.className = 'shell shell-' + color + ' shell-pop';
    var top = document.createElement('div');
    top.className = 'shell-top';
    var bottom = document.createElement('div');
    bottom.className = 'shell-bottom';
    shell.appendChild(top);
    shell.appendChild(bottom);
    return shell;
  }

  function formatDecimal(n){
    var s = n.toFixed(1);
    return currentLang === 'ru' ? s.replace('.', ',') : s;
  }
  function formatPct(n){
    return formatDecimal(n) + '%';
  }

  function renderCounts(){
    el.redCount.textContent = state.red;
    el.greenCount.textContent = state.green;
    el.redMinus.disabled = state.red === 0;
    el.greenMinus.disabled = state.green === 0;
    el.redPlus.disabled = state.locked;
    el.greenPlus.disabled = state.locked;
  }

  function renderChances(){
    var total = state.red + state.green;
    var redPct = total ? (state.red / total * 100) : 0;
    var greenPct = total ? (state.green / total * 100) : 0;
    var dict = translations[currentLang];

    el.redChance.textContent = formatPct(redPct);
    el.greenChance.textContent = formatPct(greenPct);
    el.progressRed.style.width = redPct + '%';
    el.progressGreen.style.width = greenPct + '%';

    el.verdictBox.classList.remove('verdict-red', 'verdict-green', 'verdict-tie');

    if (total === 0) {
      el.verdictText.textContent = '\u2014';
    } else if (redPct === greenPct) {
      el.verdictBox.classList.add('verdict-tie');
      el.verdictText.textContent = dict.verdictTie;
    } else if (redPct > greenPct) {
      el.verdictBox.classList.add('verdict-red');
      el.verdictText.textContent = dict.verdictLive;
    } else {
      el.verdictBox.classList.add('verdict-green');
      el.verdictText.textContent = dict.verdictBlank;
    }
  }

  // Озвучивает прогноз. Вызывается ТОЛЬКО из голосового триггера (isSamTrigger) —
  // клики, клавиши 7/9/1/3 и голосовые add/remove сюда не ведут.
  function announcePrediction(name){
    var displayName = name.charAt(0).toUpperCase() + name.slice(1);
    var dict = translations[currentLang];
    var total = state.red + state.green;
    if (total === 0) {
      speak(dict.speechEmpty(displayName));
      return;
    }
    var redPct = state.red / total * 100;
    var greenPct = state.green / total * 100;
    var word = redPct === greenPct ? dict.speechTie : (redPct > greenPct ? dict.speechLive : dict.speechBlank);
    speak(dict.speechPredict(displayName, word));
  }

  function addRound(color){
    if (state.locked) return;
    state[color]++;
    var strip = color === 'red' ? el.redStrip : el.greenStrip;
    strip.appendChild(createShell(color));
    renderCounts();
    renderChances();
  }

  // Lock выключен: "-" убирает патрон из обоймы (настройка изначального расклада).
  // Lock включён: "-" = выстрел — патрон гаснет визуально (opacity 50%), но НЕ исчезает,
  // а пул для расчёта шансов уменьшается как обычно (чистая условная вероятность, без "теории серий").
  function removeRound(color){
    if (state[color] === 0) return;
    var totalBefore = state.red + state.green;
    var pctBefore = totalBefore ? (state[color] / totalBefore * 100) : 0;

    state[color]--;
    var strip = color === 'red' ? el.redStrip : el.greenStrip;

    if (state.locked) {
      var liveShells = strip.querySelectorAll('.shell:not(.fired)');
      var target = liveShells[0];
      if (target) target.classList.add('fired');
    } else {
      if (strip.lastElementChild) strip.removeChild(strip.lastElementChild);
    }

    renderCounts();
    renderChances();

    var totalAfter = state.red + state.green;
    var pctAfter = totalAfter ? (state[color] / totalAfter * 100) : 0;
    var diff = pctAfter - pctBefore;
    var sign = diff > 0 ? '+' : '';
    var dict = translations[currentLang];
    var label = color === 'red' ? dict.streakLive : dict.streakBlank;

    el.verdictDelta.textContent = label + ': ' + formatPct(pctBefore) + ' \u2192 ' + formatPct(pctAfter) + ' (' + sign + formatDecimal(diff) + ' pts)';
    el.verdictDelta.classList.remove('hidden');
  }

  el.redPlus.addEventListener('click', function(){ addRound('red'); });
  el.redMinus.addEventListener('click', function(){ removeRound('red'); });
  el.greenPlus.addEventListener('click', function(){ addRound('green'); });
  el.greenMinus.addEventListener('click', function(){ removeRound('green'); });

  el.lockBtn.addEventListener('click', function(){
    state.locked = !state.locked;
    refreshLockButton();
    el.lockBtn.classList.toggle('active', state.locked);
    renderCounts();
  });

  el.resetBtn.addEventListener('click', function(){
    state.red = 0;
    state.green = 0;
    state.locked = false;
    el.redStrip.innerHTML = '';
    el.greenStrip.innerHTML = '';
    refreshLockButton();
    el.lockBtn.classList.remove('active');
    el.verdictDelta.textContent = '';
    el.verdictDelta.classList.add('hidden');
    renderCounts();
    renderChances();
  });

  // ---------- Клавиатура ----------
  document.addEventListener('keydown', function(e){
    var tag = (document.activeElement && document.activeElement.tagName) || '';
    var isTyping = tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA';

    if (e.key === 'Escape') {
      if (!el.infoModal.hidden) el.infoModal.hidden = true;
      if (isTyping) document.activeElement.blur();
      return;
    }
    if (isTyping) return;

    switch(e.code){
      case 'Digit7':
      case 'Numpad7':
        addRound('red');
        break;
      case 'Digit9':
      case 'Numpad9':
        removeRound('red');
        break;
      case 'Digit1':
      case 'Numpad1':
        addRound('green');
        break;
      case 'Digit3':
      case 'Numpad3':
        removeRound('green');
        break;
    }
  });

  // ---------- Голосовой синтез (TTS) ----------
  var cachedVoices = [];
  function loadVoices(){ cachedVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
  if (window.speechSynthesis) {
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }

  // iOS/Android глушат speechSynthesis.speak(), если движок ни разу не запускался
  // напрямую из тап/клик-события пользователя. Наши speak()-вызовы приходят из
  // голосового callback'а (не прямой жест), поэтому без разовой "разблокировки"
  // на первый тап по странице озвучка на телефонах молчит без единой ошибки.
  var speechUnlocked = false;
  function unlockSpeech(){
    if (speechUnlocked || !('speechSynthesis' in window)) return;
    speechUnlocked = true;
    var primer = new SpeechSynthesisUtterance(' ');
    primer.volume = 0;
    try { window.speechSynthesis.speak(primer); } catch(e){}
  }
  document.addEventListener('click', unlockSpeech, { once: true });
  document.addEventListener('touchend', unlockSpeech, { once: true });

  var voiceNameHints = {
    'ru-RU': {
      male: ['pavel','dmitri','dmitry','yuri','ivan','maxim','artem','egor','male','man'],
      female: ['irina','katya','milena','anna','tatyana','elena','marina','female','girl','google']
    },
    'en-US': {
      male: ['david','mark','guy','james','daniel','alex','fred','male','man'],
      female: ['zira','samantha','susan','jenny','aria','linda','hazel','karen','female','girl','google']
    }
  };

  function pickVoice(lang, gender){
    if (!cachedVoices.length) return null;
    var baseLang = lang.split('-')[0];
    var langVoices = cachedVoices.filter(function(v){
      return v.lang === lang || v.lang.indexOf(baseLang) === 0;
    });
    if (!langVoices.length) return null;
    var hints = (voiceNameHints[lang] && voiceNameHints[lang][gender]) || [];
    var matched = langVoices.filter(function(v){
      var n = v.name.toLowerCase();
      return hints.some(function(h){ return n.indexOf(h) !== -1; });
    });
    var pool = matched.length ? matched : langVoices;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function speak(text){
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    var lang = currentLang === 'ru' ? 'ru-RU' : 'en-US';
    utter.lang = lang;
    utter.rate = 1.05;
    utter.pitch = state.voiceGender === 'female' ? 1.15 : 0.85;
    var voice = pickVoice(lang, state.voiceGender);
    if (voice) utter.voice = voice;

    if (recognitionActive && recognition) {
      try { recognition.stop(); } catch(e){}
    }
    utter.onend = utter.onerror = function(){
      if (recognitionActive && recognition) {
        try { recognition.start(); } catch(e){}
      }
    };
    window.speechSynthesis.speak(utter);
  }

  // ---------- Распознавание голосовых команд ----------
  var SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognition = null;
  var recognitionActive = false;

  var assistantNames = [
    'сэм','сем','сам','сом','сим','сум','дилер',
    'стас','никита','аня','макс','алекс','влад','дима','артем','софа','ева','илья','миша','коля',
    'лиза','елизавета','наташа','наталия','маргарита','марго','рита','ника','вероника','людмила','люда','ира','ирина','таня','татьяна','оля','ольга',
    'sam','jack','ann','dealer'
  ];

  var commandPatterns = {
    ru: {
      green: /холост|зел[её]н/,
      red: /боев|красн/,
      add: /\+|плюс|добав|прибав/,
      sub: /-|минус|убав|убер|убра|отним/,
      reset: /сброс|очист|скину|скинь|ресет/,
      lock: /заблокировать|блок|зафиксировать|лок|локни|залочь/,
      next: /следующ|следуйщ|желательно/,
      numberWords: {'один':1,'одна':1,'одно':1,'два':2,'две':2,'три':3,'четыре':4,'пять':5,'шесть':6,'семь':7,'восемь':8}
    },
    en: {
      green: /blank|green/,
      red: /live|red/,
      add: /\+|add|plus/,
      sub: /-|remove|minus|subtract/,
      reset: /reset|clear/,
      lock: /\block\b/,
      next: /next/,
      numberWords: {'one':1,'two':2,'three':3,'four':4,'five':5,'six':6,'seven':7,'eight':8}
    }
  };

  function parseNumber(text, numberWords){
    var digitMatch = text.match(/\d+/);
    if (digitMatch) {
      return Math.max(1, Math.min(8, parseInt(digitMatch[0], 10)));
    }
    var words = text.split(/\s+/);
    for (var i = 0; i < words.length; i++) {
      if (numberWords.hasOwnProperty(words[i])) return numberWords[words[i]];
    }
    return 1;
  }

  // Возвращает имя, которым назвали помощника (для подстановки в озвучку), или null.
  // Имя матчится только как целое слово — числительные вроде "семь"/"восемь" не задеваются.
  function isSamTrigger(text, patterns){
    var words = text.split(/[^а-яёa-z]+/).filter(Boolean);
    for (var i = 0; i < words.length; i++) {
      var w = words[i];
      if (state.customName && w === state.customName.toLowerCase()) return state.customName;
      if (assistantNames.indexOf(w) !== -1) return w;
    }
    if (patterns.next.test(text)) return defaultAssistantName();
    return null;
  }

  function matchCommand(rawText){
    var text = rawText.toLowerCase();
    var patterns = commandPatterns[currentLang] || commandPatterns.en;

    var isGreenCmd = patterns.green.test(text);
    var isRedCmd = patterns.red.test(text);
    var isAddCmd = patterns.add.test(text);
    var isSubCmd = patterns.sub.test(text);

    if ((isGreenCmd || isRedCmd) && (isAddCmd || isSubCmd)) {
      var color = isRedCmd ? 'red' : 'green';
      var count = parseNumber(text, patterns.numberWords);
      for (var i = 0; i < count; i++) {
        if (isAddCmd) { addRound(color); } else { removeRound(color); }
      }
    }

    if (patterns.reset.test(text)) {
      el.resetBtn.click();
    }

    if (patterns.lock.test(text)) {
      el.lockBtn.click();
    }

    var triggerName = isSamTrigger(text, patterns);
    if (triggerName) {
      announcePrediction(triggerName);
    }
  }

  if (SpeechRecognitionCtor) {
    recognition = new SpeechRecognitionCtor();
    recognition.lang = currentLang === 'ru' ? 'ru-RU' : 'en-US';
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onresult = function(e){
      var last = e.results[e.results.length - 1];
      var transcript = last[0].transcript;
      el.voiceStatus.textContent = '\u00AB' + transcript.trim() + '\u00BB';
      matchCommand(transcript);
    };

    recognition.onerror = function(e){
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        recognitionActive = false;
        el.voiceBtn.classList.remove('listening');
        el.voiceBtn.textContent = translations[currentLang].voiceBtnIdle;
        el.voiceStatus.textContent = translations[currentLang].voiceStatusDenied;
      }
    };

    recognition.onend = function(){
      if (recognitionActive) {
        try { recognition.start(); } catch(e){}
      }
    };

    el.voiceBtn.addEventListener('click', function(){
      recognitionActive = !recognitionActive;
      if (recognitionActive) {
        try { recognition.start(); } catch(e){}
      } else {
        try { recognition.stop(); } catch(e){}
      }
      el.voiceBtn.classList.toggle('listening', recognitionActive);
      refreshVoiceUI();
    });
  } else {
    el.voiceBtn.disabled = true;
  }

  renderCounts();
  setLanguage('en');
})();
</script>
</body>
</html>
